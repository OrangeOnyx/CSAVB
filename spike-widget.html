<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spike – CSA Volleyball AI Assistant</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== WIDGET CONTAINER ===== */
  #spike-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  /* ===== SPIKE AVATAR LAUNCHER ===== */
  #spike-launcher {
    position: relative;
    cursor: pointer;
    width: 90px;
    height: 90px;
    filter: drop-shadow(0 8px 24px rgba(26,79,156,0.45));
    animation: spike-idle 2.8s ease-in-out infinite;
    transition: transform 0.2s ease;
    user-select: none;
  }
  #spike-launcher:hover {
    animation: spike-hover 0.4s ease-in-out infinite alternate;
    filter: drop-shadow(0 12px 32px rgba(26,79,156,0.6));
  }
  #spike-launcher img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
  }

  /* Pulse ring when idle */
  #spike-launcher::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 3px solid rgba(192,39,45,0.5);
    animation: pulse-ring 2.8s ease-in-out infinite;
  }

  /* "Let's Talk!" bubble */
  #spike-bubble {
    position: absolute;
    bottom: 100%;
    right: 0;
    background: #C0272D;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 20px 20px 4px 20px;
    white-space: nowrap;
    margin-bottom: 8px;
    box-shadow: 0 4px 12px rgba(192,39,45,0.4);
    animation: bubble-pop 3s ease-in-out infinite;
    pointer-events: none;
  }

  /* ===== CHAT PANEL ===== */
  #spike-panel {
    display: none;
    flex-direction: column;
    width: 360px;
    max-width: calc(100vw - 48px);
    height: 520px;
    max-height: calc(100vh - 140px);
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(15,31,61,0.25);
    overflow: hidden;
    animation: panel-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1px solid rgba(26,79,156,0.12);
  }
  #spike-panel.open { display: flex; }

  /* Panel Header */
  #spike-header {
    background: linear-gradient(135deg, #0f1f3d 0%, #1A4F9C 60%, #133a75 100%);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 3px solid #C0272D;
    flex-shrink: 0;
  }
  #spike-avatar-small {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    object-fit: cover;
    animation: spike-idle-small 2.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  #spike-avatar-small.talking {
    animation: spike-talk 0.25s ease-in-out infinite alternate;
  }
  .spike-header-info { flex: 1; }
  .spike-header-info h3 {
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: 20px;
  }
  .spike-header-info p {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 500;
    margin-top: 1px;
  }
  .spike-status {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 3px;
  }
  .spike-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    animation: status-pulse 2s ease-in-out infinite;
  }
  .spike-status span {
    color: rgba(255,255,255,0.65);
    font-size: 10px;
  }
  #spike-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #spike-close:hover { background: rgba(255,255,255,0.2); }

  /* Messages */
  #spike-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8f9fc;
    scroll-behavior: smooth;
  }
  #spike-messages::-webkit-scrollbar { width: 4px; }
  #spike-messages::-webkit-scrollbar-track { background: transparent; }
  #spike-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

  .msg {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    animation: msg-in 0.3s ease;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid #1A4F9C;
  }
  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg.spike .msg-bubble {
    background: #fff;
    color: #1f2937;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 1px solid #e5e7eb;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #1A4F9C, #133a75);
    color: #fff;
    border-radius: 18px 4px 18px 18px;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #fff;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 1px solid #e5e7eb;
    width: fit-content;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #1A4F9C;
    animation: typing-bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Quick replies */
  #spike-quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 16px;
    background: #f8f9fc;
    border-top: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  .quick-reply {
    background: #fff;
    border: 1.5px solid #1A4F9C;
    color: #1A4F9C;
    font-size: 11.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-reply:hover {
    background: #1A4F9C;
    color: #fff;
  }

  /* Input Area */
  #spike-input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  #spike-input {
    flex: 1;
    border: 1.5px solid #e5e7eb;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    background: #f8f9fc;
    color: #1f2937;
    resize: none;
    height: 42px;
    max-height: 100px;
    overflow-y: auto;
  }
  #spike-input:focus { border-color: #1A4F9C; background: #fff; }
  #spike-input::placeholder { color: #9ca3af; }
  #spike-send {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C0272D, #a01f24);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  #spike-send:hover { transform: scale(1.08); }
  #spike-send:active { transform: scale(0.95); }
  #spike-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #spike-send svg { width: 18px; height: 18px; }

  /* ===== ANIMATIONS ===== */
  @keyframes spike-idle {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    25% { transform: translateY(-8px) rotate(1deg); }
    50% { transform: translateY(-4px) rotate(-1deg); }
    75% { transform: translateY(-10px) rotate(2deg); }
  }
  @keyframes spike-hover {
    0% { transform: scale(1.05) rotate(-3deg); }
    100% { transform: scale(1.1) rotate(3deg); }
  }
  @keyframes spike-idle-small {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-3px) scale(1.03); }
  }
  @keyframes spike-talk {
    0% { transform: scale(1) rotate(-2deg); }
    100% { transform: scale(1.06) rotate(2deg); }
  }
  @keyframes pulse-ring {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(1.08); }
  }
  @keyframes bubble-pop {
    0%, 80%, 100% { opacity: 1; transform: scale(1); }
    90% { opacity: 0.8; transform: scale(1.05); }
  }
  @keyframes status-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes panel-in {
    from { opacity: 0; transform: scale(0.85) translateY(20px); transform-origin: bottom right; }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes typing-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* ===== MOBILE ===== */
  @media (max-width: 480px) {
    #spike-panel {
      position: fixed;
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      max-width: 100%;
      height: 75vh;
      border-radius: 20px 20px 0 0;
    }
    #spike-widget {
      bottom: 16px;
      right: 16px;
    }
  }
</style>
</head>
<body>

<!-- ===== SPIKE WIDGET ===== -->
<div id="spike-widget">

  <!-- Chat Panel -->
  <div id="spike-panel">

    <!-- Header -->
    <div id="spike-header">
      <img id="spike-avatar-small" src="https://files.manuscdn.com/user_upload_by_module/session_file/310419663028278258/XswBnkrAArPKXBnl.png" alt="Spike">
      <div class="spike-header-info">
        <h3>SPIKE</h3>
        <p>CSA Volleyball AI Assistant</p>
        <div class="spike-status">
          <div class="spike-status-dot"></div>
          <span>Ready to help!</span>
        </div>
      </div>
      <button id="spike-close" aria-label="Close chat">✕</button>
    </div>

    <!-- Messages -->
    <div id="spike-messages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick Replies -->
    <div id="spike-quick-replies">
      <button class="quick-reply" data-msg="How do I register?">📝 Register</button>
      <button class="quick-reply" data-msg="What age groups can play?">🏐 Age Groups</button>
      <button class="quick-reply" data-msg="When are games and practices?">📅 Schedule</button>
      <button class="quick-reply" data-msg="What equipment does my child need?">👟 Equipment</button>
    </div>

    <!-- Input -->
    <div id="spike-input-area">
      <textarea id="spike-input" placeholder="Ask Spike anything..." rows="1"></textarea>
      <button id="spike-send" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Launcher -->
  <div id="spike-launcher" role="button" aria-label="Chat with Spike" tabindex="0">
    <div id="spike-bubble">Hey! Let's talk! 🏐</div>
    <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310419663028278258/XswBnkrAArPKXBnl.png" alt="Spike the CSA Volleyball mascot">
  </div>

</div>

<script src="spike-config.js"></script>
<script>
(function() {
  'use strict';

  // ===== CONFIG =====
  // API key is loaded from window.SPIKE_CONFIG (set in spike-config.js — not committed to git)
  const OPENAI_API_KEY = (window.SPIKE_CONFIG && window.SPIKE_CONFIG.openaiKey) || '';
  const SPIKE_IMAGE = 'https://files.manuscdn.com/user_upload_by_module/session_file/310419663028278258/XswBnkrAArPKXBnl.png';

  const SYSTEM_PROMPT = `You are Spike, the official AI assistant for CSA Volleyball (Cajun Sports Association), a youth recreational volleyball program in Lafayette, Louisiana.

PERSONALITY:
- Energetic, encouraging, and team-first
- Friendly for kids, polished for parents
- Sounds like a helpful youth volleyball coach
- Always positive — never sarcastic, never negative

TONE:
- Short responses (2–3 sentences max unless more detail is clearly needed)
- Conversational and confident
- Use volleyball language naturally
- Occasionally use short phrases like "Let's go!", "You got this!", or "Game time!" — but don't overdo it

PROGRAM FACTS (always base answers on these):
- Organization: Cajun Sports Association (CSA) Volleyball, Lafayette, Louisiana
- Director: Stephanie Abdalla
- Website: https://cajunsportsvolleyball.com
- Mission: Provide girls in grades 1–6 a safe, fun, structured environment to learn volleyball
- No-cut policy: every registered player is placed on a team with equal playing time
- Divisions: Beginner (Grades 1–2, ages 6–8), Developmental (Grades 3–4, ages 8–10), Intermediate (Grades 5–6, ages 10–12)
- Seasons: Fall (September–November) and Spring (February–April), 9 weeks each
- Each week: one practice + weekend games, ending with a tournament
- Practice location: Comeaux Sports Complex
- Game location: Earl K. Long Gym (ULL campus)
- Registration: online at https://cajunsportsvolleyball.com
- Jersey included in registration; families provide athletic shorts, non-marking shoes, knee pads (recommended)
- No jewelry during play
- Net heights: Grades 1–2 = 6ft, Grades 3–4 = 6ft 6in, Grades 5–6 = 7ft
- Match format: Best 2 of 3 sets (25/25/15), rally scoring, 5-in-a-row rule
- Coaches: must be 18+, complete background check and SafeSport training
- Drop-off/pick-up: no more than 15 minutes early or late

BEHAVIOR:
- Welcome visitors warmly
- Help parents find registration, schedules, teams, rules, and locations
- If unsure of a specific detail, guide the user to https://cajunsportsvolleyball.com
- Always offer a next step or call to action
- Guide interested users toward registration

RULES:
- Never make up specific dates, prices, or URLs you don't know
- Keep answers short and action-oriented
- If asked about something outside CSA Volleyball, politely redirect to what you can help with`;

  // ===== STATE =====
  let isOpen = false;
  let isTyping = false;
  let conversationHistory = [{ role: 'system', content: SYSTEM_PROMPT }];
  let talkTimeout = null;

  // ===== ELEMENTS =====
  const widget = document.getElementById('spike-widget');
  const panel = document.getElementById('spike-panel');
  const launcher = document.getElementById('spike-launcher');
  const bubble = document.getElementById('spike-bubble');
  const messages = document.getElementById('spike-messages');
  const input = document.getElementById('spike-input');
  const sendBtn = document.getElementById('spike-send');
  const closeBtn = document.getElementById('spike-close');
  const avatarSmall = document.getElementById('spike-avatar-small');
  const quickReplies = document.querySelectorAll('.quick-reply');

  // ===== OPEN / CLOSE =====
  function openPanel() {
    isOpen = true;
    panel.classList.add('open');
    bubble.style.display = 'none';
    launcher.style.animation = 'none';
    launcher.style.transform = 'scale(0.9)';
    if (messages.children.length === 0) addWelcomeMessage();
    setTimeout(() => input.focus(), 400);
  }

  function closePanel() {
    isOpen = false;
    panel.classList.remove('open');
    bubble.style.display = '';
    launcher.style.animation = '';
    launcher.style.transform = '';
  }

  launcher.addEventListener('click', () => isOpen ? closePanel() : openPanel());
  launcher.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); isOpen ? closePanel() : openPanel(); } });
  closeBtn.addEventListener('click', closePanel);

  // ===== WELCOME MESSAGE =====
  function addWelcomeMessage() {
    const welcomes = [
      "Hey! I'm Spike, your CSA Volleyball guide! 🏐 I can help with registration, schedules, rules, and anything about the program. What's on your mind?",
      "What's up! I'm Spike — CSA Volleyball's AI assistant. Ask me about sign-ups, schedules, age groups, or anything else. Let's go!",
      "Hey there! Spike here, ready to help you navigate CSA Volleyball. Registration, schedules, rules — I've got you covered. What do you need?"
    ];
    const msg = welcomes[Math.floor(Math.random() * welcomes.length)];
    addMessage('spike', msg);
    conversationHistory.push({ role: 'assistant', content: msg });
  }

  // ===== ADD MESSAGE TO UI =====
  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'spike') {
      const img = document.createElement('img');
      img.src = SPIKE_IMAGE;
      img.className = 'msg-avatar';
      img.alt = 'Spike';
      div.appendChild(img);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    div.appendChild(bubble);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  // ===== TYPING INDICATOR =====
  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg spike';
    div.id = 'spike-typing';

    const img = document.createElement('img');
    img.src = SPIKE_IMAGE;
    img.className = 'msg-avatar';
    img.alt = 'Spike';
    div.appendChild(img);

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(dots);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;

    // Spike talks animation
    avatarSmall.classList.add('talking');
  }

  function hideTyping() {
    const typing = document.getElementById('spike-typing');
    if (typing) typing.remove();
    avatarSmall.classList.remove('talking');
  }

  // ===== TALKING ANIMATION TRIGGER =====
  function triggerTalkAnimation(duration = 2000) {
    avatarSmall.classList.add('talking');
    clearTimeout(talkTimeout);
    talkTimeout = setTimeout(() => avatarSmall.classList.remove('talking'), duration);
  }

  // ===== SEND MESSAGE =====
  async function sendMessage(text) {
    text = text.trim();
    if (!text || isTyping) return;

    // Add user message
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    // Clear input
    input.value = '';
    input.style.height = '42px';

    // Disable send
    isTyping = true;
    sendBtn.disabled = true;

    // Show typing
    showTyping();

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify({
          model: 'gpt-4.1-mini',
          messages: conversationHistory,
          max_tokens: 200,
          temperature: 0.75,
          presence_penalty: 0.3
        })
      });

      if (!response.ok) throw new Error(`API error: ${response.status}`);

      const data = await response.json();
      const reply = data.choices[0].message.content.trim();

      hideTyping();
      addMessage('spike', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

      // Animate Spike talking
      triggerTalkAnimation(reply.length * 50);

    } catch (err) {
      console.error('Spike error:', err);
      hideTyping();
      addMessage('spike', "Whoa, I hit a timeout! Try again — I'm still here for you! 🏐");
    }

    isTyping = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ===== EVENT LISTENERS =====
  sendBtn.addEventListener('click', () => sendMessage(input.value));

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = '42px';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });

  // Quick replies
  quickReplies.forEach(btn => {
    btn.addEventListener('click', () => {
      if (!isOpen) openPanel();
      setTimeout(() => sendMessage(btn.dataset.msg), 100);
    });
  });

  // Hide bubble after 8 seconds
  setTimeout(() => {
    if (!isOpen) {
      bubble.style.transition = 'opacity 0.5s';
      bubble.style.opacity = '0';
      setTimeout(() => { bubble.style.display = 'none'; }, 500);
    }
  }, 8000);

})();
</script>
</body>
</html>
